name: Build APK

# Se ejecuta en cada cambio (push) y también con el botón "Run workflow"
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf \
            libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev automake autopoint gettext

      - name: Instalar Buildozer y Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.34

      - name: Compilar el APK (debug)
        # 'yes |' acepta automáticamente las licencias del SDK de Android
        run: yes | buildozer android debug

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: CalificadorApp-APK
          path: bin/*.apk
