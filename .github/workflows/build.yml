name: Build APK

# Se ejecuta en cada cambio que subas (push) y también con el botón "Run workflow"
on:
  push:
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Compilar con Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: CalificadorApp-APK
          path: ${{ steps.buildozer.outputs.filename }}
